name: E2E Tests (Playwright)

on:
  push:
    branches: [main, develop]
    paths:
      - 'anchorfund-frontend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'anchorfund-frontend/**'

defaults:
  run:
    working-directory: anchorfund-frontend

jobs:
  e2e:
    name: Playwright E2E – Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: anchorfund-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          VITE_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          VITE_CONTRACT_ID: PLACEHOLDER_CONTRACT_ID
          VITE_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: anchorfund-frontend/playwright-report/
          retention-days: 30

      - name: Upload test videos (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-videos
          path: anchorfund-frontend/test-results/
          retention-days: 7
