name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  contract:
    name: Contrato Soroban
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: anchorfund
      - name: cargo test
        run: cd anchorfund && cargo test
      - name: cargo clippy
        run: cd anchorfund && cargo clippy -- -D warnings

  frontend:
    name: Frontend React
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: anchorfund-frontend/package-lock.json
      - name: Install dependencies
        run: cd anchorfund-frontend && npm ci
      - name: Lint
        run: cd anchorfund-frontend && npm run lint
      - name: Unit tests
        run: cd anchorfund-frontend && npm run test:run -- --coverage
        env:
          VITE_CONTRACT_ID: PLACEHOLDER_CONTRACT_ID
          VITE_RPC_URL: https://soroban-testnet.stellar.org
          VITE_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"

  indexer:
    name: Indexer Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: anchorfund-indexer/package-lock.json
      - name: Install dependencies
        run: cd anchorfund-indexer && npm ci
